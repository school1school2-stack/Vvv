<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التميز | أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --success: #10b981; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); user-select: none; -webkit-user-select: none; }
        .header { background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white; padding: 40px; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 90%, 0% 100%); }
        .container { max-width: 800px; margin: -30px auto 50px; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        .card.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .q-box { background: #f1f5f9; padding: 20px; border-radius: 15px; border-right: 5px solid var(--accent); margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-family: 'Cairo'; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; }
        #timer { position: sticky; top: 10px; background: white; padding: 10px; border-radius: 50px; border: 2px solid var(--primary); width: fit-content; margin: 0 auto 20px; font-weight: 900; z-index: 1000; }
        @media print { body { display: none !important; } } /* منع الطباعة */
    </style>
</head>
<body oncontextmenu="return false;"> <header class="header">
    <h1>اختبار كفايات الفعل المضارع</h1>
    <p>إعداد الأستاذ: عبدالعزيز الفيفي | ثانوية الأمير عبدالمجيد</p>
</header>

<div class="container" id="app-root">
    <div id="timer">⏱️ المتبقي: <span id="time-display">30:00</span></div>

    <form id="quiz-form">
        <div class="card active" id="auth-card">
            <h2 style="text-align:center;">دخول آمن للمرة الأولى</h2>
            <p style="color:red; text-align:center; font-size:13px;">* تنبيه: يُمنع تصوير الشاشة أو إعادة الاختبار، سيتم حظرك آلياً عند المخالفة.</p>
            <input type="text" id="stu-name" placeholder="الاسم الثلاثي" style="width:100%; padding:15px; margin:20px 0; border:2px solid #ddd; border-radius:10px; box-sizing:border-box;" required>
            <button type="button" class="btn btn-primary" onclick="initSecurityCheck()">بدء الاختبار العشوائي</button>
        </div>

        <div id="questions-container"></div>
    </form>

    <div id="result-card" class="card">
        <h2 style="text-align:center">انتهى الاختبار</h2>
        <div id="final-score" style="font-size:60px; text-align:center; color:var(--primary); font-weight:900;">0/35</div>
        <p style="text-align:center; font-weight:bold;">أ. عبدالعزيز الفيفي يتمنى لكم التوفيق.</p>
    </div>
</div>

<script>
    // 1. مخزن الـ 90 سؤالاً (تم اختصارها هنا للتمثيل الهيكلي، يمكنك تعبئة الباقي بنفس النمط)
    const questionBank = [
        { q: "علامة رفع (يسعى) هي الضمة المقدرة للـ:", type: "radio", opts: ["الثقل", "التعذر", "الجزم", "النصب"], ans: "التعذر" },
        { q: "أي الأدوات التالية تنصب الفعل المضارع؟", type: "radio", opts: ["لم", "لا الناهية", "لن", "لام الأمر"], ans: "لن" },
        { q: "الأفعال الخمسة ترفع بـ:", type: "radio", opts: ["الضمة", "ثبوت النون", "الواو"], ans: "ثبوت النون" },
        // ... يتبع حتى 90 سؤالاً بنفس التنسيق ...
    ];

    // إضافة أسئلة تلقائية لتكملة الـ 90 (لأغراض البرمجة)
    for(let i=1; i<=87; i++) {
        questionBank.push({
            q: `سؤال عشوائي رقم ${i+3} في مهارات المضارع (تطبيق القاعدة ${i}):`,
            type: "radio", opts: ["خيار 1", "خيار 2", "الإجابة الصحيحة", "خيار 4"], ans: "الإجابة الصحيحة"
        });
    }

    let userQuestions = [];
    let currentStep = 0;

    // 2. منع تصوير الشاشة (عن طريق منع الأزرار)
    document.addEventListener('keydown', function(e) {
        if (e.key === "PrintScreen" || (e.ctrlKey && e.key === 'p') || (e.ctrlKey && e.shiftKey && e.key === 'S')) {
            alert("تنبيه: تصوير الشاشة ممنوع بقرار من أ. عبدالعزيز الفيفي.");
            e.preventDefault();
        }
    });

    // 3. التحقق من عدم الإعادة وبدء الاختبار
    function initSecurityCheck() {
        const name = document.getElementById('stu-name').value.trim();
        if (name.length < 5) return Swal.fire('خطأ', 'يرجى كتابة الاسم كاملاً', 'error');

        if (localStorage.getItem('fifi_done_' + name)) {
            document.getElementById('app-root').innerHTML = `<div class='card active' style='text-align:center;'><h2>🚫 غير مسموح</h2><p>لقد أتممت الاختبار مسبقاً.</p></div>`;
            return;
        }

        // خلط واختيار 35 سؤالاً عشوائياً
        userQuestions = questionBank.sort(() => 0.5 - Math.random()).slice(0, 35);
        renderQuestions();
        document.getElementById('auth-card').classList.remove('active');
        document.getElementById('step-0').classList.add('active');
        startTimer();
    }

    function renderQuestions() {
        const cont = document.getElementById('questions-container');
        userQuestions.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.id = `step-${index}`;
            div.innerHTML = `
                <h3>سؤال ${index + 1} من 35</h3>
                <div class="q-box"><p>${item.q}</p>
                    ${item.opts.map(o => `<label style="display:block; margin:10px 0; cursor:pointer;"><input type="radio" name="q${index}" value="${o}"> ${o}</label>`).join('')}
                </div>
                <button type="button" class="btn btn-primary" onclick="nextQuestion(${index})">
                    ${index === 34 ? 'إرسال الإجابات النهائية' : 'السؤال التالي ⬅️'}
                </button>
            `;
            cont.appendChild(div);
        });
    }

    function nextQuestion(index) {
        if (index === 34) {
            submitQuiz();
        } else {
            document.getElementById(`step-${index}`).classList.remove('active');
            document.getElementById(`step-${index + 1}`).classList.add('active');
            window.scrollTo(0,0);
        }
    }

    let time = 1800;
    function startTimer() {
        const timerInt = setInterval(() => {
            let m = Math.floor(time/60), s = time%60;
            document.getElementById('time-display').innerText = `${m}:${s<10?'0'+s:s}`;
            if (time-- <= 0) { clearInterval(timerInt); submitQuiz(); }
        }, 1000);
    }

    function submitQuiz() {
        const name = document.getElementById('stu-name').value;
        localStorage.setItem('fifi_done_' + name, 'true');
        
        let score = 0;
        userQuestions.forEach((item, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if (sel && sel.value === item.ans) score++;
        });

        document.getElementById('quiz-form').style.display = 'none';
        document.getElementById('timer').style.display = 'none';
        document.getElementById('result-card').classList.add('active');
        document.getElementById('final-score').innerText = `${score} / 35`;
        
        Swal.fire('تم الرصد', 'شكراً لك، تم تسجيل درجتك بنجاح.', 'success');
    }
</script>
</body>
</html>
