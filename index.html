<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاختبار الشامل | أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; user-select: none; }
        .header { background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white; padding: 40px; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%); }
        .container { max-width: 900px; margin: -50px auto 60px; padding: 0 20px; }
        #timer-box { position: sticky; top: 10px; z-index: 1000; background: white; border: 2px solid var(--primary); padding: 8px 25px; border-radius: 50px; width: fit-content; margin: 0 auto 20px; font-weight: 900; color: var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: none; }
        .card.active { display: block; animation: fadeInUp 0.4s; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .section-header { background: #e0f2fe; color: var(--primary); padding: 15px; border-radius: 12px; margin-bottom: 25px; font-weight: 900; border-right: 8px solid var(--primary); }
        .q-item { background: #f1f5f9; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .opt-label { background: white; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 10px; font-family: 'Cairo'; margin-top: 10px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-family: 'Cairo'; font-weight: 700; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn-next { background: var(--primary); color: white; }
        @media print { body { display: none; } }
    </style>
</head>
<body oncontextmenu="return false;">

<header class="header">
    <h1>الاختبار النهائي للكفايات اللغوية</h1>
    <p>إعداد أ. عبدالعزيز الفيفي | ثانوية الأمير عبدالمجيد</p>
</header>

<div class="container" id="quiz-wrapper">
    <div id="timer-box">⏱️ المتبقي: <span id="clock">40:00</span></div>

    <form id="quiz-form">
        <div class="card active" id="auth-screen">
            <h2 style="text-align:center;">بيانات الطالب</h2>
            <input type="text" id="stu-name" placeholder="الاسم الثلاثي" required>
            <input type="text" id="stu-class" placeholder="الفصل" required>
            <button type="button" class="btn btn-next" onclick="generateQuiz()">بدء الاختبار (42 سؤالاً)</button>
            <p style="text-align:center; color:red; font-size:12px; margin-top:15px;">⚠️ نظام الحماية نشط: يُمنع التصوير أو الإعادة.</p>
        </div>
        <div id="quiz-content"></div>
    </form>

    <div id="result-screen" class="card">
        <h2 style="text-align:center;">تم الانتهاء بنجاح</h2>
        <div style="font-size:60px; text-align:center; color:var(--primary); font-weight:900;" id="final-score">0 / 42</div>
        <p id="student-info" style="text-align:center; font-weight:bold;"></p>
    </div>
</div>

<script>
    // مخزن الأسئلة مقسم حسب طلبك (7 لكل نوع من 4 نماذج)
    const bank = {
        choose: [ // قسم 1: اختر (4 خيارات)
            {q: "علامة رفع الفعل (يذاكرُ) هي:", o: ["الضمة الظاهرة", "ثبوت النون", "الواو", "الفتحة"], a: "الضمة الظاهرة"},
            {q: "يجزم الفعل المضارع إذا سبقه:", o: ["أن", "لن", "لم", "كي"], a: "لم"},
            // ... أضف هنا 28 سؤالاً لهذا النوع ليغطي 4 نماذج
        ],
        fill: [ // قسم 2: أكمل الفراغ
            {q: "ينصب الفعل المضارع إذا سبقه حرف ........", a: "لن"},
            {q: "الأفعال الخمسة ترفع بـ ........", a: "ثبوت النون"},
            // ... أضف 28 سؤالاً
        ],
        example: [ // قسم 3: مثل في جملة
            {q: "مثل لـ: فعل مضارع مجزوم بحذف حرف العلة.", a: "جملة"},
            {q: "مثل لـ: فعل مضارع منصوب بفتحة مقدرة.", a: "جملة"},
            // ... أضف 28 سؤالاً
        ],
        parse: [ // قسم 4: أعرب
            {q: "أعرب ما تحته خط: (لم *يسعَ* الطالب للشر).", a: "إعراب"},
            {q: "أعرب ما تحته خط: (لن *تكتبي* إلا الحق).", a: "إعراب"},
            // ... أضف 28 سؤالاً
        ],
        extract: [ // قسم 5: استخرج
            {q: "استخرج الفعل المضارع: (يخشى المؤمن ربه).", a: "يخشى"},
            {q: "استخرج حرف النصب: (عليك أن تذاكر).", a: "أن"},
            // ... أضف 28 سؤالاً
        ],
        trueFalse: [ // قسم 6: صح وخطأ
            {q: "الفتحة تظهر على الفعل المعتل بالواو عند النصب.", o: ["صح", "خطأ"], a: "صح"},
            {q: "الأفعال الخمسة تجزم بالسكون.", o: ["صح", "خطأ"], a: "خطأ"},
            // ... أضف 28 سؤالاً
        ]
    };

    // تعبئة تلقائية لضمان عمل الكود فوراً (90 سؤال إجمالي)
    Object.keys(bank).forEach(key => {
        while(bank[key].length < 28) {
            bank[key].push({q: `سؤال إضافي في قسم ${key}`, o: ["خيار 1", "خيار 2", "خيار 3", "خيار 4"], a: "خيار 1"});
        }
    });

    function generateQuiz() {
        const name = document.getElementById('stu-name').value;
        if(name.length < 5) return Swal.fire('تنبيه','اكتب اسمك الثلاثي','warning');
        if(localStorage.getItem('lock_'+name)) {
            document.getElementById('quiz-wrapper').innerHTML = "<h2 style='text-align:center;'>🚫 عذراً، لا يمكن الإعادة.</h2>";
            return;
        }

        const content = document.getElementById('quiz-content');
        const types = ['choose', 'fill', 'example', 'parse', 'extract', 'trueFalse'];
        const titles = ['اختر الإجابة الصحيحة', 'أكمل الفراغات التالية', 'مثّل في جملة مفيدة', 'أعرب ما تحته خط', 'استخرج المطلوب', 'صح أم خطأ'];

        types.forEach((type, index) => {
            const sec = document.createElement('div');
            sec.className = 'card';
            sec.id = `sec-${index+1}`;
            sec.innerHTML = `<div class="section-header">القسم ${index+1}: ${titles[index]} (7 أسئلة)</div>`;
            
            // سحب 7 أسئلة عشوائية لكل قسم
            const selected = bank[type].sort(() => 0.5 - Math.random()).slice(0, 7);
            
            selected.forEach((item, qIdx) => {
                const totalIdx = (index * 7) + qIdx;
                let inputHtml = '';
                if(type === 'choose' || type === 'trueFalse') {
                    inputHtml = `<div class="opt-grid">${item.o.map(o => `<label class="opt-label"><input type="radio" name="q${totalIdx}" value="${o}"> ${o}</label>`).join('')}</div>`;
                } else {
                    inputHtml = `<input type="text" name="q${totalIdx}" placeholder="اكتب إجابتك هنا...">`;
                }
                sec.innerHTML += `<div class="q-item"><p><b>س${qIdx+1}:</b> ${item.q}</p>${inputHtml}</div>`;
            });

            const isLast = index === 5;
            sec.innerHTML += `<button type="button" class="btn btn-next" onclick="move(${index+1}, ${isLast})">${isLast ? 'إرسال الاختبار' : 'القسم التالي ⬅️'}</button>`;
            content.appendChild(sec);
        });

        document.getElementById('auth-screen').classList.remove('active');
        document.getElementById('sec-1').classList.add('active');
        startTimer();
    }

    function move(curr, last) {
        if(last) finish(); else {
            document.getElementById(`sec-${curr}`).classList.remove('active');
            document.getElementById(`sec-${curr+1}`).classList.add('active');
            window.scrollTo(0,0);
        }
    }

    let time = 2400; // 40 دقيقة
    function startTimer() {
        const t = setInterval(() => {
            let m = Math.floor(time/60), s = time%60;
            document.getElementById('clock').innerText = `${m}:${s<10?'0'+s:s}`;
            if(time-- <= 0) { clearInterval(t); finish(); }
        }, 1000);
    }

    function finish() {
        const name = document.getElementById('stu-name').value;
        localStorage.setItem('lock_'+name, '1');
        document.getElementById('quiz-form').style.display = 'none';
        document.getElementById('timer-box').style.display = 'none';
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('student-info').innerText = `الطالب: ${name} | الفصل: ${document.getElementById('stu-class').value}`;
        Swal.fire('تم الرصد', 'انتهى الاختبار بنجاح.', 'success');
    }

    // منع التصوير
    document.addEventListener('keydown', e => { if(e.key==="PrintScreen" || (e.ctrlKey && e.key==='p')) { e.preventDefault(); alert('التصوير ممنوع'); }});
</script>
</body>
</html>
