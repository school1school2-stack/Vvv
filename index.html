<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاختبار المركزي | قواعد اللغة العربية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --main-bg: #f8fafc;
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --accent-color: #3b82f6;
            --text-main: #1e293b;
            --card-bg: #ffffff;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* رأس الصفحة */
        .hero-section {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: white;
            padding: 60px 20px;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
            margin-bottom: -50px;
        }

        .hero-section h1 { margin: 0; font-size: 2.5rem; font-weight: 900; }
        .hero-section p { opacity: 0.9; font-size: 1.1rem; }

        .container { max-width: 850px; margin: auto; padding: 20px; position: relative; }

        /* صندوق بيانات الطالب */
        .student-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Cairo';
            font-size: 16px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* المؤقت التنازلي الاحترافي */
        #timer-container {
            position: sticky;
            top: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary-color);
            padding: 10px 25px;
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #timer { font-weight: 900; color: var(--primary-color); font-size: 22px; }

        /* تصميم الأقسام والأسئلة */
        .quiz-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border: 1px solid #f1f5f9;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            color: var(--secondary-color);
            border-right: 5px solid var(--primary-color);
            padding-right: 15px;
        }

        .question-box {
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 12px;
            background: #f8fafc;
            transition: 0.3s;
        }

        .question-box:hover { background: #f1f5f9; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .option-label {
            background: white;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .option-label:hover { border-color: var(--accent-color); background: #eff6ff; }
        
        input[type="radio"]:checked + span { color: var(--primary-color); font-weight: bold; }

        /* أزرار التحكم */
        .footer-action { text-align: center; margin-top: 50px; padding-bottom: 100px; }
        
        .btn-submit {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .btn-submit:hover {
            background: var(--secondary-color);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3);
        }

        @media (max-width: 600px) {
            .student-card, .options-grid { grid-template-columns: 1fr; }
            .hero-section h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<section class="hero-section">
    <h1>اختبار اللغة العربية التفاعلي</h1>
    <p>الموضوع: حالات الفعل المضارع (الرفع، النصب، الجزم)</p>
</section>

<div class="container">
    <div class="student-card">
        <div>
            <label>اسم الطالب الرباعي:</label>
            <input type="text" id="name" placeholder="أدخل اسمك هنا...">
        </div>
        <div>
            <label>الصف والفصل:</label>
            <input type="text" id="class" placeholder="مثال: ثالث ثانوي - 1">
        </div>
    </div>

    <div id="timer-container">
        <span>⏱️ الوقت المتبقي:</span>
        <span id="timer">30:00</span>
    </div>

    <form id="quizForm">
        <div class="quiz-section">
            <div class="section-header"><h2>1. اختبر ذكاءك (اختيار من متعدد)</h2></div>
            
            <div class="question-box">
                <p>1. أي الأفعال التالية مرفوع بضمة مقدرة للثقل؟</p>
                <div class="options-grid">
                    <label class="option-label"><input type="radio" name="q1" value="1"> <span>يسعى</span></label>
                    <label class="option-label"><input type="radio" name="q1" value="2"> <span>يقضي</span></label>
                    <label class="option-label"><input type="radio" name="q1" value="3"> <span>يكتبُ</span></label>
                    <label class="option-label"><input type="radio" name="q1" value="4"> <span>لن يدعوَ</span></label>
                </div>
            </div>
            </div>

        <div class="quiz-section">
            <div class="section-header"><h2>2. أكمل الجمل بما يناسبها</h2></div>
            <div class="question-box">
                <p>• المجتهدون لن ................. (يفشل) في تحقيق أحلامهم. (اكتب الفعل صحيحاً)</p>
                <input type="text" style="width: 250px;" placeholder="الإجابة...">
            </div>
            </div>

        <div class="footer-action">
            <button type="button" class="btn-submit" onclick="validateAndSubmit()">إرسال النتيجة النهائية</button>
        </div>
    </form>
</div>

<script>
    // نظام المؤقت التنازلي
    let time = 30 * 60;
    const timerEl = document.getElementById('timer');

    const itv = setInterval(() => {
        let m = Math.floor(time / 60);
        let s = time % 60;
        timerEl.innerHTML = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        if (time <= 0) {
            clearInterval(itv);
            Swal.fire('انتهى الوقت!', 'تم تسليم إجاباتك تلقائياً.', 'warning');
            submitData();
        }
        time--;
    }, 1000);

    function validateAndSubmit() {
        const name = document.getElementById('name').value;
        const sClass = document.getElementById('class').value;

        if (!name || !sClass) {
            Swal.fire({
                icon: 'error',
                title: 'بيانات ناقصة',
                text: 'لطفاً، اكتب اسمك وفصلك قبل الإرسال!',
                confirmButtonText: 'حسناً'
            });
            return;
        }

        Swal.fire({
            title: 'هل أنت متأكد؟',
            text: "لن تتمكن من تعديل الإجابات بعد الإرسال!",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#2563eb',
            cancelButtonColor: '#d33',
            confirmButtonText: 'نعم، أرسل الآن',
            cancelButtonText: 'مراجعة'
        }).then((result) => {
            if (result.isConfirmed) {
                submitData();
            }
        });
    }

    function submitData() {
        clearInterval(itv);
        Swal.fire(
            'تم التسليم!',
            'أحسنت صنعاً، تم رفع إجاباتك للمراجعة.',
            'success'
        );
        // هنا يمكن إضافة كود لتعطيل النموذج أو مسحه
    }
</script>
</body>
</html>
