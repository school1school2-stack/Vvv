<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة النحو الذكية | اختبار مع مساعد تفاعلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #4338ca; --accent: #6366f1; --success: #10b981; --hint: #f59e0b; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding: 0; }
        .header { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 50px 20px; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%); }
        .container { max-width: 900px; margin: -40px auto 60px; padding: 0 20px; }
        #timer-bar { position: sticky; top: 10px; z-index: 100; background: white; border: 2px solid var(--primary); padding: 10px 25px; border-radius: 50px; width: fit-content; margin: 0 auto 20px; font-weight: 900; color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .progress-box { width: 100%; background: #e2e8f0; height: 12px; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.5s ease; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); display: none; border: 1px solid #eef2f6; }
        .card.active { display: block; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .q-item { background: #f9fafb; padding: 25px; border-radius: 20px; margin-bottom: 30px; border-right: 8px solid var(--accent); position: relative; }
        .q-title { font-weight: 700; font-size: 18px; margin-bottom: 15px; display: block; color: var(--primary); }
        .hint-btn { background: var(--hint); color: white; border: none; padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; margin-top: 10px; font-family: 'Cairo'; transition: 0.3s; }
        .hint-btn:hover { opacity: 0.8; transform: scale(1.05); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .opt-label { background: white; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; font-size: 15px; }
        .opt-label:hover { border-color: var(--accent); background: #f5f7ff; }
        input[type="text"] { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Cairo'; font-size: 16px; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(67, 56, 202, 0.1); }
        .nav-controls { display: flex; justify-content: space-between; margin-top: 40px; gap: 20px; }
        .btn { padding: 14px 45px; border-radius: 15px; border: none; font-family: 'Cairo'; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 17px; }
        .btn-next { background: var(--primary); color: white; flex: 2; }
        .btn-prev { background: #94a3b8; color: white; flex: 1; }
        .btn-finish { background: var(--success); color: white; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: white; border-radius: 15px; overflow: hidden; }
        th, td { padding: 18px; border: 1px solid #f1f5f9; text-align: right; }
        th { background: #f8fafc; color: var(--primary); font-weight: 900; }
        .score-box { font-size: 55px; font-weight: 900; color: var(--primary); text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

<header class="header">
    <h1>منصة الاختبارات الذكية</h1>
    <p>إعراب الفعل المضارع - المستوى المتقدم</p>
</header>

<div class="container">
    <div id="timer-bar">⏱️ المتبقي: <span id="clock">30:00</span></div>
    <div class="progress-box"><div id="progress-fill"></div></div>

    <form id="masterForm">
        <div class="card active" id="step0">
            <h2 style="text-align:center">تسجيل البيانات</h2>
            <div style="display:grid; gap:20px; margin-top:20px;">
                <input type="text" id="name" placeholder="الاسم الكامل" required>
                <input type="text" id="class" placeholder="الصف / الفصل" required>
                <button type="button" class="btn btn-next" onclick="move(1)">ابدأ الاختبار</button>
            </div>
        </div>

        <div id="quiz-steps"></div>
    </form>

    <div id="result-page" class="card">
        <h2 style="text-align:center">نتيجتك النهائية</h2>
        <div class="score-box" id="total-score">0 / 35</div>
        <div id="user-info" style="text-align:center; margin-bottom:20px; font-weight:bold; color:#64748b;"></div>
        <div style="overflow-x:auto">
            <table id="summary">
                <thead>
                    <tr>
                        <th>السؤال</th>
                        <th>إجابتك</th>
                        <th>الصحيحة</th>
                        <th>التقييم</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <button class="btn btn-next" style="width:100%; margin-top:30px" onclick="location.reload()">اختبار جديد</button>
    </div>
</div>

<script>
    // الأسئلة مع التلميحات وأنماط التصحيح
    const quizData = [
        // القسم 1
        { q: "علامة رفع (يسعى) هي الضمة المقدرة للـ:", type: 'radio', opts: ["الثقل", "التعذر", "الجزم", "النصب"], ans: "التعذر", hint: "الألف دائماً للتعذر، والواو والياء للثقل." },
        { q: "حرف نصب يفيد نفي الفعل في المستقبل هو:", type: 'radio', opts: ["أن", "لن", "كي", "حتى"], ans: "لن", hint: "فكر في الأداة التي نستخدمها لنفي حدوث شيء غداً." },
        { q: "يجزم الفعل (يدعو) بـ:", type: 'radio', opts: ["السكون", "حذف حرف العلة", "حذف النون", "الفتحة"], ans: "حذف حرف العلة", hint: "الفعل ينتهي بـ 'واو'، فماذا يحدث لها عند الجزم؟" },
        { q: "الأفعال الخمسة ترفع بـ:", type: 'radio', opts: ["الواو", "ثبوت النون", "الضمة", "الألف"], ans: "ثبوت النون", hint: "تذكر: يكتبون، تكتبين، يكتبان.. ما الحرف الموجود في آخرها؟" },
        { q: "علامة نصب (لن يرميَ) هي الفتحة:", type: 'radio', opts: ["الظاهرة", "المقدرة للثقل", "المقدرة للتعذر", "المقدرة للجزم"], ans: "الظاهرة", hint: "الفتحة تظهر على الياء والواو لخفتها." },
        { q: "(إنْ تذاكرْ تنجحْ)؛ الأداة (إنْ) تجزم:", type: 'radio', opts: ["فعلاً واحداً", "فعلين", "ثلاثة أفعال", "لا تجزم"], ans: "فعلين", hint: "هذا أسلوب شرط، والشرط يحتاج لفعل وجواب." },
        { q: "علامة جزم الأفعال الخمسة هي:", type: 'radio', opts: ["السكون", "حذف النون", "حذف حرف العلة", "الفتحة"], ans: "حذف النون", hint: "الأفعال الخمسة تُرفع بالنون وتُنصب وتُجزم بـ...." },

        // القسم 2
        { q: "يجبُ أنْ ............ (ينجح) المجتهدُ. (اضبط الفعل بالحركة)", type: 'text', ans: "ينجحَ", hint: "الفعل مسبوق بـ 'أنْ' الناصبة، وهو صحيح الآخر." },
        { q: "لا ............ (تنسى) الصلاةَ. (اكتب الفعل مجزوماً)", type: 'text', ans: "تنسَ", hint: "هذه 'لا' الناهية، والفعل معتل الآخر بالألف." },
        { q: "الطلابُ ............ (يدرس) بجد. (ارفع الفعل بثبوت النون)", type: 'text', ans: "يدرسون", hint: "أضف واو الجماعة ونون الرفع." },
        { q: "لم ............ (يقضي) المسلم بالظلم. (مجزوماً)", type: 'text', ans: "يقضِ", hint: "احذف الياء وضع كسرة تدل عليها." },
        { q: "لن ............ (يسعى) الكسول للمجد. (اكتب الفعل المنتهي بألف)", type: 'text', ans: "يسعى", hint: "الفعل ينتهي بألف، والفتحة على الألف دائماً مقدرة." },
        { q: "كي ............ (تنالَ) الجنة أطع والديك. (اضبط الحركة)", type: 'text', ans: "تنالَ", hint: "كي من أدوات النصب." },
        { q: "ليـ............ (يدعُ) المؤمن ربه. (مجزوماً بعد لام الأمر)", type: 'text', ans: "يدعُ", hint: "احذف الواو وضع ضمة تدل عليها." },

        // القسم 3
        { q: "علامة جزم الفعل معتل الآخر هي حذف حرف العلة.", type: 'radio', opts: ["صح", "خطأ"], ans: "صح", hint: "تذكر حذف الواو والألف والياء عند الجزم." },
        { q: "لام التعليل من أدوات جزم الفعل المضارع.", type: 'radio', opts: ["صح", "خطأ"], ans: "خطأ", hint: "لام التعليل تجيب على سؤال 'لماذا؟' وهي ناصبة." },
        { q: "الضمة المقدرة للثقل تكون على الواو والياء.", type: 'radio', opts: ["صح", "خطأ"], ans: "صح", hint: "نعم، نستطيع نطقها لكنها ثقيلة." },
        { q: "تجزم الأفعال الخمسة بالسكون.", type: 'radio', opts: ["صح", "خطأ"], ans: "خطأ", hint: "علامة جزمها حذف النون." },
        { q: "الأداة (لم) حرف نفي وجزم وقلب.", type: 'radio', opts: ["صح", "خطأ"], ans: "صح", hint: "هذا هو التعريف الكامل والصحيح لـ 'لم'." },
        { q: "تُحذف النون في حالة نصب الأفعال الخمسة.", type: 'radio', opts: ["صح", "خطأ"], ans: "صح", hint: "نعم، مثل: لن يذهبوا." },
        { q: "يبنى المضارع إذا اتصلت به نون النسوة على السكون.", type: 'radio', opts: ["صح", "خطأ"], ans: "صح", hint: "مثل: الفتيات يكتبْن." },

        // القسم 4 (ذكاء أنماط)
        { q: "مثل لـ: فعل مضارع منصوب بـ (لن) وعلامته الفتحة الظاهرة.", type: 'pattern', pat: /^لن\s+[\u0600-\u06FF]+َ$/, sample: "لن يكتبَ", hint: "ابدأ بـ 'لن' ثم فعل ينتهي بفتحة." },
        { q: "مثل لـ: فعل مضارع مجزوم بـ (لم) وعلامته السكون.", type: 'pattern', pat: /^لم\s+[\u0600-\u06FF]+ْ$/, sample: "لم يذهبْ", hint: "ابدأ بـ 'لم' ثم فعل ينتهي بسكون." },
        { q: "مثل لـ: فعل من الأفعال الخمسة مرفوع.", type: 'pattern', pat: /[\u0600-\u06FF]+ون$/, sample: "يعملون", hint: "فعل ينتهي بـ واو ونون." },
        { q: "مثل لـ: فعل مضارع مجزوم بحذف حرف العلة.", type: 'pattern', pat: /^(لم|لا|لـ)\s+[\u0600-\u06FF]+[َُِ]$/, sample: "لم يسعَ", hint: "استخدم 'لم' وفعل محذوف آخره (مثل: يمشِ، يدعُ، يسعَ)." },
        { q: "مثل لـ: فعل مضارع مرفوع بضمة مقدرة.", type: 'pattern', pat: /[\u0600-\u06FF]+[اويى]$/, sample: "يقضي", hint: "أي فعل ينتهي بألف أو واو أو ياء بدون أداة قبله." },
        { q: "مثل لـ: فعل مضارع منصوب بلام التعليل.", type: 'pattern', pat: /^لـ[\u0600-\u06FF]+َ$/, sample: "ليكتبَ", hint: "ابدأ بـ 'لـ' ملتصقة بالفعل المنتهي بفتحة." },
        { q: "مثل لـ: أداة شرط تجزم فعلين.", type: 'text', ans: "إنْ", hint: "أشهر حرف شرط جازم." },

        // القسم 5 (استخراج من نص: مَن يجتهدْ يلقَ النجاح ولن يتكاسلوا)
        { q: "استخرج أداة شرط جازمة:", type: 'text', ans: "مَن", hint: "أول كلمة في النص." },
        { q: "استخرج فعلاً مجزوماً بالسكون (فعل الشرط):", type: 'text', ans: "يجتهدْ", hint: "الفعل الذي يأتي بعد 'مَن'." },
        { q: "استخرج جواب شرط مجزوماً بحذف حرف العلة:", type: 'text', ans: "يلقَ", hint: "نتيجة الاجتهاد هي..." },
        { q: "استخرج فعلاً منصوباً بحذف النون:", type: 'text', ans: "يتكاسلوا", hint: "الفعل الذي جاء بعد 'لن'." },
        { q: "استخرج أداة نصب:", type: 'text', ans: "لن", hint: "الأداة التي سبقت 'يتكاسلوا'." },
        { q: "ما علامة جزم الفعل 'يلقَ'؟", type: 'text', ans: "حذف حرف العلة", hint: "أصله 'يلقى'، فماذا حدث للألف؟" },
        { q: "ما علامة نصب 'يتكاسلوا'؟", type: 'text', ans: "حذف النون", hint: "لأنه من الأفعال الخمسة." }
    ];

    const stepsCont = document.getElementById('quiz-steps');
    for (let s = 0; s < 5; s++) {
        const div = document.createElement('div');
        div.className = 'card'; div.id = `step${s+1}`;
        div.innerHTML = `<h3 style="color:var(--primary); margin-bottom:25px;">القسم ${s+1}: 7 أسئلة</h3>`;
        
        for (let q = 0; q < 7; q++) {
            const i = (s * 7) + q; const item = quizData[i];
            let html = `<div class="q-item"><span class="q-title">س${q+1}: ${item.q}</span>`;
            if (item.type === 'radio') {
                html += `<div class="options-grid">`;
                item.opts.forEach(o => html += `<label class="opt-label"><input type="radio" name="q${i}" value="${o}"> ${o}</label>`);
                html += `</div>`;
            } else {
                html += `<input type="text" id="ans${i}" placeholder="اكتب إجابتك هنا...">`;
            }
            html += `<button type="button" class="hint-btn" onclick="showHint('${item.hint}')">💡 تلميحة المساعد</button></div>`;
            div.innerHTML += html;
        }

        div.innerHTML += `<div class="nav-controls">
            <button type="button" class="btn btn-prev" onclick="move(${s})">السابق</button>
            ${s===4 ? `<button type="button" class="btn btn-finish" onclick="grade()">إنهاء وتصحيح</button>` : `<button type="button" class="btn btn-next" onclick="move(${s+2})">التالي</button>`}
        </div>`;
        stepsCont.appendChild(div);
    }

    function showHint(msg) { Swal.fire({ title: 'تلميحة نحوية', text: msg, icon: 'info', confirmButtonText: 'فهمت' }); }

    function move(n) {
        if (n===1 && !document.getElementById('name').value) { Swal.fire('تنبيه', 'يرجى كتابة الاسم أولاً', 'warning'); return; }
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById(`step${n}`).classList.add('active');
        document.getElementById('progress-fill').style.width = (n / 5) * 100 + "%";
        window.scrollTo(0,0);
    }

    let time = 1800;
    const timer = setInterval(() => {
        let m = Math.floor(time/60), s = time%60;
        document.getElementById('clock').innerText = `${m}:${s<10?'0'+s:s}`;
        if (time-- <= 0) { clearInterval(timer); grade(); }
    }, 1000);

    function grade() {
        clearInterval(timer);
        let score = 0; const tbody = document.querySelector('#summary tbody');
        tbody.innerHTML = '';

        quizData.forEach((item, i) => {
            let userVal = '';
            if (item.type === 'radio') {
                const sel = document.querySelector(`input[name="q${i}"]:checked`);
                userVal = sel ? sel.value : 'لا توجد إجابة';
            } else {
                userVal = document.getElementById(`ans${i}`).value.trim();
            }

            let isCorrect = (item.type === 'pattern') ? item.pat.test(userVal) : (userVal === item.ans);
            if (isCorrect) score++;

            tbody.innerHTML += `<tr style="background:${isCorrect?'#f0fff4':'#fff5f5'}">
                <td>${item.q}</td>
                <td>${userVal}</td>
                <td style="color:var(--success)">${item.sample || item.ans}</td>
                <td>${isCorrect?'✅':'❌'}</td>
            </tr>`;
        });

        document.getElementById('masterForm').style.display = 'none';
        document.getElementById('timer-bar').style.display = 'none';
        document.getElementById('result-page').style.display = 'block';
        document.getElementById('total-score').innerText = `${score} / 35`;
        document.getElementById('user-info').innerText = `الطالب: ${document.getElementById('name').value} | الفصل: ${document.getElementById('class').value}`;
        
        Swal.fire('أحسنت!', `لقد حصلت على ${score} من 35`, 'success');
    }
</script>
</body>
</html>
